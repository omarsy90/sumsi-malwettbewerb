<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raiffeisen Landesbank Kärnten</title>
    <link rel="stylesheet" href="/src/style/style.css">
    <script src="../js/loging.js" defer></script>
</head>
<body>
    <header>
        <img src="../img/reife_reisen_logo.png" alt="Raifeisenlogo" class="raifeisenlogo">
        <nav>
            <ul>
                <li class="ignore"><a href="./homepage.html">Home Page</a></li>
                <li class="ignore"><a href="./anmeldung.html">Log In</a></li>
            </ul>
        </nav>
        <nav class="sprache">
            <ul>
                <li class="flagge de">
                    <img src="../img/deutsh.png"> 
                </li>
                <li class="flagge en">
                    <img src="../img/englisch.png">
                </li>
            </ul>
        </nav>
        <div class="nav_mobile"></div>
    </header>
    <div class="menu-mobile">
        <nav class="pagelist">
            <ul>
                <li class="ignore"><a href="./homepage.html">Home Page</a></li>
                <li class="ignore"><a href="./anmeldung.html">Log In</a></li>
            </ul>
        </nav>
        <nav class="sprache">
            <ul>
                <li class="flagge de">
                    <img src="../img/deutsh.png"> 
                </li>
                <li class="flagge en">
                    <img src="../img/englisch.png">
                </li>
            </ul>
        </nav>
    </div>

    <section class="box" >
        <h1>Login</h1>
        <input type="text" name="email" placeholder="Email" id="email">
        <input type="password" name="password" placeholder="Password" id="password">
        <input type="submit" name="" value="Login" id="submite">
    </section>

    <div class="notify">
        <table id="table">
            <tr><td> Submission Status :</td> <td id="abgabe">open</td></tr>
            <tr><td>Review Status :</td> <td id="bewertung">closed</td> </tr>
        </table>
    </div>

    <p class="error_notify"> Either the email or password is incorrect</p>
</body>

<style>

    .error_notify{
        background-color: #000000;
        
        padding: 30px;
        text-align: center;
        
        color: red;
         display: none;
        
    }

    body{
       background-color: #FBF315;
    }

    header{
        background: white;
    }

    .box{
        width: 550px;
        padding: 40px;
        position: absolute;
        top: 400px;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #000000;
        text-align: center;
    }

    .box input[type = "text"], .box input[type = "password"] {
        border: 0;
        background: none;
        display: block;
        margin: 20px auto;
        text-align: center;
        border: 2px solid #FBF315;
        padding: 14px 10px;
        width: 200px;
        outline: none;
        color: white;
        border-radius: 24px;
        transition: 0.25s;
    }

    
    .box input[type = "text"]:focus, .box input[type = "password"]:focus{
        width: 280px;
    }

    .box h1{
        background: #FBF315;
        border-radius: 24px;
        padding: 10px;
    }

    .box input[type = "submit"]{
        border: 0;
        background: none;
        display: block;
        margin: 20px auto;
        text-align: center;
        padding: 14px 10px;
        width: 100px;
        outline: none;
        color: black;
        background: whitesmoke;
        border-radius: 24px;
        transition: 0.25s;
        font-weight: bold;
    }

    .box input[type = "submit"]:hover {  
        background: #FBF315;
        cursor: pointer;
    }

    .notify{
        width: 300px;
        padding: 40px;
        position: absolute;
        top: 720px ;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        background: #000000;
        color: white;
        font-size: 1.2rem;
        font-weight: bold;
        border-radius: 1rem;
        display: none;
    }


</style>

</html>
